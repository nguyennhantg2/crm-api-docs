  '/workspaces/{workspace_id}/orders':
    get:
      description: |
        List orders in a workspace, most recent first.

        Results are paginated using `page` / `page_size` (offset-based) and can be narrowed
        with `search` (matches order code `OD...`, custom ID, or billing phone number) and
        a structured `filter`. Only orders the current API key is allowed to see are returned.
      operationId: listOrders
      parameters:
        - $ref: '#/parameters/WorkspaceId'
        - $ref: '#/parameters/Page'
        - $ref: '#/parameters/PageSize'
        - name: search
          in: query
          type: string
          required: false
          description: |
            Free-text search. Matches the order code (e.g. `OD00012` or `12`),
            the custom ID, or the billing phone number.
          example: "OD00012"
        - name: filter
          in: query
          type: string
          required: false
          example: '{"fields":[]}'
          description: |
            JSON-encoded structured filter. Shape:

            ```json
            {
              "fields": [
                { "field_name": "status", "value": ["new"], "is_filter_exclude": false }
              ]
            }
            ```

            Supported `field_name` values: `status`, `source_ids`, `contact`, `product`,
            `assigning_seller`, `created_by`, `cod`, `total_discount`, `created_on`, `modified_on`.
        - name: deal_id
          in: query
          type: string
          format: uuid
          required: false
          description: Return only orders linked to this deal (record relation of type `deal`).
      responses:
        '200':
          description: Orders returned
          schema:
            title: Orders List
            type: object
            description: Paginated orders list response
            properties:
              success:
                description: Indicates whether the request was successful
                type: boolean
              fallback:
                type: string
                example: "with_data"
              data:
                type: object
                description: Paginated payload
                properties:
                  entries:
                    description: List of order objects
                    type: array
                    items:
                      $ref: '#/definitions/Order'
                  page_number:
                    type: integer
                    example: 1
                  page_size:
                    type: integer
                    example: 30
                  total_entries:
                    type: integer
                    example: 128
                  total_pages:
                    type: integer
                    example: 5
      summary: List orders
      tags:
        - Orders
    post:
      description: |
        Create a new order in the workspace.

        The order payload must be wrapped in an `order` object. An order must be linked to a
        contact: provide either an existing `contact_id`, or a `contact` object (with at least
        a `name`, and usually a `phone_number`) which will be upserted into the `contact` table
        and linked automatically. Order line items go in `order.items`; monetary totals
        (`total_quantity`, `total_discount`, `cod`, `prepaid`, …) are computed server-side from
        the items and payment fields.
      operationId: createOrder
      parameters:
        - $ref: '#/parameters/WorkspaceId'
        - description: Order body
          in: body
          name: body
          required: true
          schema:
            type: object
            required:
              - order
            properties:
              order: &OrderInputSchema
                title: Order Input
                type: object
                description: |
                  Writable order payload (sent as the `order` field of the request body) used for both
                  create and update. Computed fields (`total_quantity`, `total_discount`, `cod`, `prepaid`,
                  `display_id`, timestamps) are derived server-side and should not be sent.
                properties:
                  contact:
                    description: |
                      Contact to link to the order. Provide an existing contact via `id`, or new contact
                      details (`name`, `phone_number`, `email`) to upsert and link automatically.
                      An order must resolve to a contact, so either `contact` or `contact_id` is required.
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      name:
                        type: string
                        example: "Nguyễn Văn A"
                      phone_number:
                        type: string
                        example: "0972273341"
                      email:
                        type: string
                  contact_id:
                    description: ID of an existing contact record to link (alternative to `contact`).
                    type: string
                    format: uuid
                  account:
                    description: Account to link to the order (same upsert behaviour as `contact`).
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      name:
                        type: string
                  account_id:
                    description: ID of an existing account record to link.
                    type: string
                    format: uuid
                  deal_id:
                    description: ID of a deal to link this order to (creates a `deal` record relation).
                    type: string
                    format: uuid
                  calendar_id:
                    description: ID of a calendar event to link this order to.
                    type: string
                    format: uuid
                  status:
                    description: Order status. Defaults to `new` when omitted on create.
                    type: string
                    example: "new"
                  code:
                    description: Custom order code. Stored as `custom_id` (alias of `custom_id`).
                    type: string
                    example: "OD00012"
                  custom_id:
                    description: Custom order code. Use this or `code`.
                    type: string
                  bill_phone_number:
                    description: Billing phone number. Defaults to the linked contact's phone number.
                    type: string
                  assigning_seller_id:
                    description: ID of the seller assigned to the order.
                    type: string
                    format: uuid
                  related_owner:
                    description: Additional owner user IDs.
                    type: array
                    items:
                      type: string
                      format: uuid
                  note:
                    description: Free-text note.
                    type: string
                  note_image:
                    description: Image URLs for the note.
                    type: array
                    items:
                      type: string
                  discount:
                    description: Order-level discount amount.
                    type: integer
                  transfer_money:
                    description: Amount paid by bank transfer.
                    type: integer
                  surcharge:
                    description: Surcharge added to the order.
                    type: integer
                  deposit:
                    description: Deposit amount paid up front.
                    type: integer
                  cash:
                    description: Cash amount paid.
                    type: integer
                  source_ids:
                    description: Source IDs to attribute the order to.
                    type: array
                    items:
                      type: string
                  is_removed:
                    description: Set to `true` to soft-delete the order.
                    type: boolean
                  extra_infor:
                    description: Dynamic custom fields.
                    type: object
                    additionalProperties: true
                  items:
                    description: Line items for the order.
                    type: array
                    items:
                      title: Order Item Input
                      type: object
                      description: A line item in a create/update order request.
                      properties:
                        id:
                          description: |
                            Existing order-item ID (UUID). Provide on update to modify an existing line item;
                            omit to add a new one. Existing items not present in the request are removed.
                          type: string
                          format: uuid
                        product_id:
                          description: Product ID for the line item. `id` is accepted as an alias.
                          type: string
                          format: uuid
                        quantity:
                          description: Quantity ordered.
                          type: integer
                          example: 2
                        price:
                          description: Unit price.
                          type: integer
                          example: 75000
                        total:
                          description: Line total. Defaults to `price * quantity` when omitted or 0.
                          type: integer
                        discount:
                          description: Per-unit discount.
                          type: integer
                        name:
                          description: Product/variation display name (snapshotted into `variation_info`).
                          type: string
                        import_price:
                          description: Import/cost price (snapshotted into `variation_info`).
                          type: integer
                        images:
                          description: Product image URLs (snapshotted into `variation_info`).
                          type: array
                          items:
                            type: string
                        category_ids:
                          description: Category IDs (snapshotted into `variation_info`).
                          type: array
                          items:
                            type: integer
                        type:
                          description: Item type (e.g. product vs service).
                          type: string
                        start_time:
                          description: Service start time.
                          type: string
                          format: date-time
                        end_time:
                          description: Service end time.
                          type: string
                          format: date-time
                        duration:
                          description: Service duration in days.
                          type: integer
                      required:
                        - quantity
                        - price
      responses:
        '200':
          description: Order created successfully
          schema:
            title: Order Create Response
            type: object
            description: Response object after creating an order
            properties:
              success:
                description: Indicates whether the create operation was successful
                type: boolean
              fallback:
                type: string
                example: "with_data"
              data:
                description: The created order object
                $ref: '#/definitions/Order'
        '403':
          description: "Forbidden, insufficient permissions"
          schema:
            title: Error Response
            type: object
            description: Error response object
            properties:
              success:
                description: Always false for error responses
                type: boolean
              message:
                type: object
        '422':
          description: "Invalid order payload (e.g. missing contact)"
          schema:
            title: Error Response
            type: object
            properties:
              success:
                type: boolean
              message:
                type: string
      summary: Create order
      tags:
        - Orders

  '/workspaces/{workspace_id}/orders/{id}':
    get:
      description: Retrieve a single order by ID, including its line items and related records.
      operationId: getOrder
      parameters:
        - $ref: '#/parameters/WorkspaceId'
        - $ref: '#/parameters/OrderId'
      responses:
        '200':
          description: Order returned
          schema:
            title: Order Response
            type: object
            description: Single order response
            properties:
              success:
                description: Indicates whether the request was successful
                type: boolean
              fallback:
                type: string
                example: "with_data"
              data:
                description: The order object
                $ref: '#/definitions/Order'
        '404':
          description: Order not found
          schema:
            title: Error Response
            type: object
            properties:
              success:
                type: boolean
              message:
                type: string
      summary: Get order
      tags:
        - Orders
    put:
      description: |
        Update an existing order by ID. The payload must be wrapped in an `order` object and
        follows the same shape as create. Only provided fields are changed.

        Line items in `order.items` are reconciled: items with an existing `item_id` are
        updated, items without one are inserted, and existing items omitted from the list are
        removed. To soft-delete an order, send `order.is_removed = true`.
      operationId: updateOrder
      parameters:
        - $ref: '#/parameters/WorkspaceId'
        - $ref: '#/parameters/OrderId'
        - description: Order fields to update
          in: body
          name: body
          required: true
          schema:
            type: object
            required:
              - order
            properties:
              order: *OrderInputSchema
      responses:
        '200':
          description: Order updated successfully
          schema:
            title: Order Update Response
            type: object
            description: Response object after updating an order
            properties:
              success:
                description: Indicates whether the update operation was successful
                type: boolean
              fallback:
                type: string
                example: "with_data"
              data:
                description: The updated order object
                $ref: '#/definitions/Order'
        '403':
          description: "Forbidden, insufficient permissions"
          schema:
            title: Error Response
            type: object
            properties:
              success:
                type: boolean
              message:
                type: object
        '404':
          description: Order not found
          schema:
            title: Error Response
            type: object
            properties:
              success:
                type: boolean
              message:
                type: string
      summary: Update order
      tags:
        - Orders

  '/workspaces/{workspace_id}/tickets':
    get:
      description: List all the tickets in a workspace.
      operationId: listTickets
      parameters:
        - $ref: '#/parameters/WorkspaceId'
        - $ref: '#/parameters/Cursor'
      responses:
        '200':
          description: Tickets returned
          schema:
            title: Tickets List
            type: object
            description: Tickets list response
            properties:
              success:
                description: Indicates whether the request was successful
                type: boolean
              entries:
                description: List of ticket objects
                items:
                  $ref: '#/definitions/Ticket'
                type: array
      summary: List tickets
      tags:
        - Tickets
    post:
      description: Create a new ticket in the workspace.
      operationId: createTicket
      parameters:
        - $ref: '#/parameters/WorkspaceId'
        - description: Ticket body
          in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/Ticket'
      responses:
        '200':
          description: Ticket created successfully
          schema:
            title: Ticket Create Response
            type: object
            description: Response object after creating a ticket
            properties:
              success:
                description: Indicates whether the create operation was successful
                type: boolean
              data:
                description: The created ticket object
                $ref: '#/definitions/Ticket'
        '403':
          description: "Forbidden, insufficient permissions"
          schema:
            title: Error Response
            type: object
            description: Error response object
            properties:
              success:
                description: Always false for error responses
                type: boolean
              message:
                type: object
        '422':
          description: "Invalid ticket payload"
          schema:
            title: Error Response
            type: object
            properties:
              success:
                type: boolean
              message:
                type: string
      summary: Create ticket
      tags:
        - Tickets

  '/workspaces/{workspace_id}/tickets/{ticket_id}':
    get:
      description: Retrieve a ticket by ID.
      operationId: getTicket
      parameters:
        - $ref: '#/parameters/WorkspaceId'
        - $ref: '#/parameters/TicketId'
      responses:
        '200':
          description: Ticket returned
          schema:
            title: Ticket Response
            type: object
            description: Single ticket response
            properties:
              success:
                description: Indicates whether the request was successful
                type: boolean
              data:
                description: The ticket object
                $ref: '#/definitions/Ticket'
        '404':
          description: Ticket not found
          schema:
            title: Error Response
            type: object
            properties:
              success:
                type: boolean
              message:
                type: string
      summary: Get ticket
      tags:
        - Tickets
    put:
      description: Update an existing ticket by ID. Only provided fields will be updated.
      operationId: updateTicket
      parameters:
        - $ref: '#/parameters/WorkspaceId'
        - $ref: '#/parameters/TicketId'
        - description: Ticket fields to update
          in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/Ticket'
      responses:
        '200':
          description: Ticket updated successfully
          schema:
            title: Ticket Update Response
            type: object
            description: Response object after updating a ticket
            properties:
              success:
                description: Indicates whether the update operation was successful
                type: boolean
              data:
                description: The updated ticket object
                $ref: '#/definitions/Ticket'
        '403':
          description: "Forbidden, insufficient permissions"
          schema:
            title: Error Response
            type: object
            properties:
              success:
                type: boolean
              message:
                type: object
        '404':
          description: Ticket not found
          schema:
            title: Error Response
            type: object
            properties:
              success:
                type: boolean
              message:
                type: string
      summary: Update ticket
      tags:
        - Tickets
    delete:
      description: Delete a ticket by ID.
      operationId: deleteTicket
      parameters:
        - $ref: '#/parameters/WorkspaceId'
        - $ref: '#/parameters/TicketId'
      responses:
        '200':
          description: Ticket deleted successfully
          schema:
            title: Ticket Delete Response
            type: object
            properties:
              success:
                type: boolean
                description: Indicates whether the delete operation was successful
        '404':
          description: Ticket not found
          schema:
            title: Error Response
            type: object
            properties:
              success:
                type: boolean
              message:
                type: string
      summary: Delete ticket
      tags:
        - Tickets

  '/workspaces/{workspace_id}/sources':
    get:
      description: List all the sources in workspace
      operationId: source
      parameters:
        - $ref: '#/parameters/WorkspaceId'
      responses:
        '200':
          description: Sources returned
          schema:
            title: Source List
            type: object
            description: Source object in source list
            properties:
              success:
                description: Indicates whether the request was successful
                type: boolean
              data:
                description: List of source objects
                items:
                  $ref: '#/definitions/Source'
                type: array
        # '404':
        #   description: User not found
      summary: Sources
      tags:
        - Sources

  '/workspaces/{workspace_id}/pages/pancake_tags':
    get:
      description: List all the pancake tags in workspace
      operationId: listPancakeTags
      parameters:
        - $ref: '#/parameters/WorkspaceId'
      responses:
        '200':
          description: Pancake tags returned
          schema:
            title: Pancake Tag List
            type: object
            description: Pancake tag list response
            properties:
              success:
                description: Indicates whether the request was successful
                type: boolean
              data:
                description: List of pancake tag objects
                items:
                  $ref: '#/definitions/PancakeTag'
                type: array
        # '404':
        #   description: User not found
      summary: List pancake tags
      tags:
        - PancakeTags

definitions:
  Record:
    description: 'Creates a new record if it does not exist, otherwise updates the existing record based on a unique key'
    properties:
      id:
        description: >
          Record ID. If provided, the record will be updated.
          If omitted, a new record will be created.
        format: uuid
        type: string
      name:
        description: Record name
        type: string
      phone_number:
        description: Record phone number
        type: string
      email:
        description: Record owner email
        type: string
      birthday:
        description: The customer's/lead's date of birth (ISO 8601 format).
        format: date-time
        type: string
      pancake_tags:
        type: array
        items:
          $ref: '#/definitions/PancakeTag/properties/id'
        description: |
          Array of pancake tag IDs applied to this record.
          [Pancake Tag schema](#/schemas/PancakeTag)
        example: ["104943019063372_11"]
      source:
        type: array
        items:
          type: integer
          # format: integer
          $ref: '#/definitions/Source/properties/id'
        description: |
          Array of integer IDs referencing the sources this lead came from.
          [Source schema](#/schemas/Source)
        example: ["-11"]
      full_address:
        type: string
        description: |
          The full address of the lead/customer.

          This field stores the complete physical or mailing address associated with the lead record.
          It is typically used for:
          - Delivery/shipping purposes
          - Location-based segmentation or targeting
          - Compliance and reporting (e.g., geographic analytics)
          - Contact verification

          Recommended format (Vietnam common style):
          - Street number + Street name, Ward/Commune, District, City/Province, Country
        example:
          "Số 126 Hàng Trống, Phường Hoàn Kiếm, Hà Nội, Việt Nam"
      created_by:
        description: ID of the user who created the record
        format: uuid
        type: string
      modified_by:
        description: ID of the user who last modified the record
        format: uuid
        type: string
      created_on:
        description: The date and time when the record was created.
        format: date-time
        type: string
      modified_on:
        description: The date and time when the record was last modified.
        format: date-time
        type: string
      owner:
        description: List of user IDs who own this record
        type: array
        items:
          type: string
          format: uuid
      interested_product:
        description: Products the lead is interested in. Only applicable to lead records (table_name = "lead"). Will not be present for account or contact records.
        type: array
        items:
          type: string
        example: ["Product A", "Product B"]
    required:
      - name
    type: object

