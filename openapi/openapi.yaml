  Ticket:
    title: Ticket
    type: object
    description: |
      A ticket represents a task, issue, or work item associated with a workspace.
      Tickets are used to track work progress, assignments, and priorities across the team.
    properties:
      id:
        description: Unique identifier (UUID) of the ticket.
        format: uuid
        type: string
        example: "b20d47ba-cc24-421c-92f6-f59da03b0ce4"
      display_id:
        description: Human-readable sequential ID of the ticket within the workspace.
        type: integer
        example: 1
      ticket_id:
        description: Custom ticket identifier (zero-padded sequential code).
        type: string
        nullable: true
        example: "00001"
      title:
        description: Title or short summary of the ticket.
        type: string
        example: "Unable to update member information"
      description:
        description: Detailed description of the ticket.
        type: string
        nullable: true
      note:
        description: Additional notes or comments about the ticket.
        type: string
        nullable: true
      category:
        description: Category classification of the ticket.
        type: string
        nullable: true
        example: "order"
      status:
        description: Current status of the ticket.
        type: string
        default: "new"
        example: "in_progress"
        enum:
          - new
          - in_progress
          - completed
          - cancelled
      priority:
        description: Priority level of the ticket.
        type: string
        nullable: true
        example: "medium"
        enum:
          - low
          - medium
          - high
          - urgent
      due_date:
        description: The date and time when the ticket is due.
        type: string
        format: date-time
        nullable: true
        example: "2026-02-07T09:37:25"
      completed_at:
        description: The date and time when the ticket was completed.
        type: string
        format: date-time
        nullable: true
      assignee_ids:
        description: List of user IDs assigned to this ticket.
        type: array
        items:
          type: string
          format: uuid
        example:
          - "4db4c09e-5fb6-47e7-a4d9-3ad49110155d"
          - "d1e93867-cc3c-4efe-8280-7b34ab80ba12"
      related_owner:
        description: List of user IDs related as owners of this ticket.
        type: array
        nullable: true
        items:
          type: string
          format: uuid
      creator_id:
        description: ID of the user who created the ticket.
        type: string
        format: uuid
        example: "0ff972fd-19a6-487e-b7ce-2398cdc8b875"
      extra_info:
        description: Dynamic custom fields defined by users.
        type: object
        additionalProperties: true
        nullable: true
        example:
          is_sample_data: true
      kanban_order:
        description: Ordering key used to sort tickets on a kanban board.
        type: string
        nullable: true
        example: "62"
      source:
        type: array
        items:
          type: integer
          $ref: '#/definitions/Source/properties/id'
        description: |
          Array of integer IDs referencing the sources this lead came from.
          [Source schema](#/schemas/Source)
        example: ["-11"]
      record_relations:
        description: |
          List of related record associations for this ticket
          (e.g. linked tasks, orders, deals, records or other tickets).
        type: array
        items:
          type: object
      contact_id:
        description: ID of the related contact/record this ticket is linked to.
        type: string
        format: uuid
        nullable: true
        example: "0c1649c6-2297-4835-9a68-8fdd1d348d8b"
      is_removed:
        description: Whether the ticket has been soft-deleted.
        type: boolean
        default: false
        example: false
      inserted_at:
        description: The date and time when the ticket was created.
        type: string
        format: date-time
        example: "2026-02-04T10:14:32.683430"
      updated_at:
        description: The date and time when the ticket was last updated.
        type: string
        format: date-time
        example: "2026-02-04T10:14:32.683430"
    required:
      - title

  Order:
    title: Order
    type: object
    description: |
      A sales order belonging to a workspace. An order groups line items (`items`), payment
      information, and links to related records (contact, account, deal, calendar) through
      `record_relations`. Monetary amounts are integers in the workspace currency's smallest
      practical unit (for VND this is the dong, with no decimals).
    properties:
      id:
        description: Unique identifier (UUID) of the order.
        format: uuid
        type: string
        example: "b20d47ba-cc24-421c-92f6-f59da03b0ce4"
      workspace_id:
        description: ID of the workspace the order belongs to.
        type: integer
        example: 2
      display_id:
        description: Human-readable sequential ID of the order within the workspace (rendered as `OD{display_id}`).
        type: integer
        example: 12
      custom_id:
        description: Custom order code/identifier.
        type: string
        nullable: true
        example: "OD00012"
      status:
        description: Current status of the order.
        type: string
        default: "new"
        example: "new"
      bill_phone_number:
        description: Billing phone number (defaults to the linked contact's phone number).
        type: string
        nullable: true
        example: "0972273341"
      bill_full_name:
        description: Billing full name.
        type: string
        nullable: true
      bill_email:
        description: Billing email (defaults to the linked contact's email).
        type: string
        nullable: true
      note:
        description: Free-text note on the order.
        type: string
        nullable: true
      note_image:
        description: List of image URLs attached to the note.
        type: array
        nullable: true
        items:
          type: string
      assigning_seller_id:
        description: ID of the user (seller) assigned to handle this order.
        type: string
        format: uuid
        nullable: true
        example: "4db4c09e-5fb6-47e7-a4d9-3ad49110155d"
      creator_id:
        description: ID of the user who created the order.
        type: string
        format: uuid
        nullable: true
      related_owner:
        description: List of additional user IDs related as owners of this order.
        type: array
        nullable: true
        items:
          type: string
          format: uuid
      total_quantity:
        description: Total quantity across all line items (computed server-side).
        type: integer
        example: 3
      discount:
        description: Order-level discount amount.
        type: integer
        example: 0
      total_discount:
        description: Sum of line-item discounts (computed server-side).
        type: integer
        example: 0
      transfer_money:
        description: Amount paid by bank transfer.
        type: integer
        example: 0
      surcharge:
        description: Additional surcharge added to the order total.
        type: integer
        example: 0
      cod:
        description: |
          Cash-on-delivery amount due, computed as
          `sum(item totals) + surcharge - discount - prepaid`.
        type: integer
        example: 150000
      prepaid:
        description: Total amount already paid (`deposit + cash + transfer_money`).
        type: integer
        example: 0
      deposit:
        description: Deposit amount paid up front.
        type: integer
        example: 0
      cash:
        description: |
          Cash portion of the prepaid amount (`prepaid - transfer_money - deposit`).
          Computed virtual field, present in responses only.
        type: integer
        example: 0
      source_ids:
        description: Array of source IDs the order is attributed to.
        type: array
        nullable: true
        items:
          type: string
        example: ["-11"]
      is_removed:
        description: Whether the order has been soft-deleted.
        type: boolean
        default: false
        example: false
      extra_infor:
        description: Dynamic custom fields. Also stores derived helpers such as `item_product_ids` and `item_prices`.
        type: object
        additionalProperties: true
        nullable: true
      items:
        description: Line items belonging to this order.
        type: array
        items:
          $ref: '#/definitions/OrderItem'
      record_relations:
        description: |
          Records linked to this order (e.g. the related `contact`, `account`, `deal`).
          Each relation embeds the resolved `record` object when available.
        type: array
        items:
          type: object
          properties:
            table_name:
              type: string
              example: "contact"
            type:
              type: string
              example: "order"
            record_id:
              type: string
            related_id:
              type: string
            record:
              type: object
              additionalProperties: true
              nullable: true
      rating:
        description: Latest rating associated with the order, if any.
        type: object
        nullable: true
      inserted_at:
        description: The date and time when the order was created.
        type: string
        format: date-time
        example: "2026-02-04T10:14:32.683430"
      updated_at:
        description: The date and time when the order was last updated.
        type: string
        format: date-time
        example: "2026-02-04T10:14:32.683430"

  OrderItem:
    title: Order Item
    type: object
    description: A single line item within an order.
    properties:
      id:
        description: Unique identifier (UUID) of the line item.
        type: string
        format: uuid
      order_id:
        description: ID of the order this item belongs to.
        type: string
        format: uuid
      product_id:
        description: ID of the product for this line item.
        type: string
        format: uuid
        nullable: true
      quantity:
        description: Quantity ordered.
        type: integer
        example: 2
      price:
        description: Unit price.
        type: integer
        example: 75000
      discount:
        description: Per-unit discount.
        type: integer
        example: 0
      total_discount:
        description: Total discount applied to this line (`subtotal - total_price`).
        type: integer
        example: 0
      total_price:
        description: Final total for this line after discount.
        type: integer
        example: 150000
      variation_info:
        description: Snapshot of the product/variation at the time of ordering.
        type: object
        nullable: true
        properties:
          name:
            type: string
            example: "Áo thun nam"
          retail_price:
            type: integer
          import_price:
            type: integer
          images:
            type: array
            items:
              type: string
          product_id:
            type: string
            format: uuid
          category_ids:
            type: array
            items:
              type: integer
          type:
            type: string
          start_time:
            type: string
            format: date-time
            nullable: true
          end_time:
            type: string
            format: date-time
            nullable: true
          duration:
            type: integer
            nullable: true
          service_info:
            type: object
            additionalProperties: true
            nullable: true
      workspace_id:
        type: integer
      inserted_at:
        type: string
        format: date-time
      updated_at:
        type: string
        format: date-time

  Source:
    type: object
    description: |
      The source of the customer (lead source).
      This field is shared and consistent across the entire workspace.
      Common values include: Facebook, Google, TikTok, Whatsapp, Shopee, Zalo, etc.
    properties:
      id:
        description: >
          Unique identifier (Integer) of the customer source record.
        format: integer
        type: string
      name:
        type: string
        example: "Facebook"
      parent_id:
        type: integer
        nullable: true
        example: 50
      image:
        type: string
        nullable: true
        example: "https://crm.pancake.vn/v2/images/logo.svg"
      is_removed:
        type: boolean
        default: false
      custom_id:
        type: string
        nullable: true
      link:
        type: string
        nullable: true
    required:
      - name
    type: object

  PancakeTag:
    title: Pancake Tag
    type: object
    description: |
      A label/tag used to classify records within a workspace.
      Tags are shared across the workspace and typically used for segmentation,
      filtering, and note-keeping on customer records.
    properties:
      id:
        type: string
        description: Unique identifier of the pancake tag.
        example: "104943019063372_11"
      text:
        type: string
        description: Display label of the tag.
        example: "Quality Check"
      description:
        type: string
        nullable: true
        description: Optional note describing the tag's purpose.
        example: "Tag used to classify orders requiring quality check before shipping"
      color:
        type: string
        description: Primary color of the tag in HEX format.
        example: "#138809"
      lighten_color:
        type: string
        description: Background/lightened color of the tag in RGBA format.
        example: "rgba(19,136,9,0.4)"
    required:
      - id
      - text
x-explorer-enabled: false