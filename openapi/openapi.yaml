swagger: '2.0'
schemes:
  - https
host: crm.pancake.vn
basePath: /api
info:
  contact:
    email: support@pancake.vn
    name: Pancake CRM Team
    url: 'https://zalo.me/0972273341'
  description: API for retrieving, updating, and deleting records from Pancake CRM.
  license:
    name: MIT
    url: 'https://opensource.org/licenses/MIT'
  title: Pancake CRM API Docs
  version: 2.0.0
  x-preferred: true
  x-providerName: pancake.vn

externalDocs:
  description: Pancake CRM API Documentation
  url: 'https://crm.pancake.vn/developers/'

consumes:
  - application/json
  - multipart/form-data

produces:
  - application/json

securityDefinitions:
  global:
    in: query
    name: api_key
    type: apiKey
    description: |
      API key is used to authenticate users when accessing the CRM API.

      You can generate an API key in Pancake CRM: Settings → Tools.

      The API key may be automatically disabled after a period of inactivity.

      ![How to get api key?](./assets/images/which-api-key.png)
security:
  - global: []

parameters:
  WorkspaceId:
    in: path
    name: workspace_id
    required: true
    type: integer
    description: The unique identifier of the workspace.

  TableName:
    in: path
    name: table_name
    required: true
    type: string
    enum:
      - lead
      - account
      - contact
    description: |
      The table of records. Accepts one of:
      - `lead`
      - `account`
      - `contact`

  TableNameQuery:
    in: query
    name: table_name
    required: true
    type: string
    enum:
      - lead
      - account
      - contact
    description: |
      The table of records. Accepts one of:
      - `lead`
      - `account`
      - `contact`

  RecordFilter:
    in: query
    name: filter
    type: string
    example: '{"search_all":"","fields":[]}'
    description: |
      JSON-encoded filter object. Shape:

      ```json
      {
        "search_all": "0972273341",
        "is_group": false,
        "fields": [
          {
            "field_name": "phone_number",
            "type": "$having_value",
            "value": null,
            "is_filter_exclude": false
          }
        ]
      }
      ```

      Top-level properties:
      - `search_all` (string, optional): Global full-text search across all text, phone
        and number fields of the record (e.g. `name`, `phone_number`, `email`). Use this
        for a "search box" style lookup. When the value contains phone-like digits, it is
        also matched against phone fields.
      - `is_group` (boolean, optional): When `true`, the conditions in `fields` are
        combined with **OR** logic. When `false` or omitted, they are combined with
        **AND** (default).
      - `fields` (array, optional): List of field conditions. Each item contains:
        - `field_name` (string): Name of the field to filter on (e.g. `phone_number`,
          `name`, `email`).
        - `type` (string): Filter operator. Supported values:
          - `$having_value` — field has a value (not empty)
          - `$having_no_value` — field is empty
          - `$enter_value` — field equals / contains `value`
          - `$select_multi` — field matches any value in the `value` array
          - `$date_time` — field is within the `[from, to]` range given in `value`
          - `$greater_than`, `$less_than`, `$greater_than_equal`, `$less_than_equal` —
            numeric comparisons (pass the number as a string in `value`)
          - `$association` — field references one of the record IDs in `value`
          - `$duplicate` — field value is duplicated across records
        - `value` (any, optional): Value(s) to compare against. Type depends on the
          operator: a single value, a number-as-string, or an array. Omit (or `null`)
          for `$having_value` / `$having_no_value`.
        - `is_filter_exclude` (boolean, optional): When `true`, the condition is negated
          (NOT). Defaults to `false`.

  RecordIds:
    name: record_ids[]
    in: query
    required: true
    description: List of record IDs to delete
    type: array
    items:
      type: string
      format: uuid
    collectionFormat: multi

  RecordViewId:
    in: query
    name: view_id
    type: string
    example: all
    description: |
      View identifier.
      Use `all` to return data from all views.

  Since:
    name: since
    in: query
    required: false
    type: integer
    format: int64
    example: 1672531200
    description: Start time in UNIX timestamp (UTC+0).

  Until:
    name: until
    in: query
    required: false
    type: integer
    format: int64
    example: 1672531200
    description: End time in UNIX timestamp (UTC+0).

  RecordId:
    description: The record ID
    in: path
    name: record_id
    required: true
    type: string

  Cursor:
    description: Pagination cursor from the previous page. The cursor value is returned in the previous response.
    in: query
    name: cursor
    type: string
    example: "g2wAAAADYR5uBgCKPA7SnAFtAAAAJDJmOTQxZWZlLWQ5YTMtNGQ5YS1hZmZlLWUxMjNiMDZiOGE0NGo"

  TicketId:
    description: The ticket ID (UUID).
    in: path
    name: ticket_id
    required: true
    type: string
    format: uuid

  OrderId:
    description: The order ID (UUID).
    in: path
    name: id
    required: true
    type: string
    format: uuid

  Page:
    description: Page number for pagination (1-based).
    in: query
    name: page
    required: false
    type: integer
    default: 1

  PageSize:
    description: Number of items returned per page.
    in: query
    name: page_size
    required: false
    type: integer
    default: 30

tags:
  - description: Manage records in a table
    name: Records
  - description: Manage tickets (tasks, issues, work items) in a workspace
    name: Tickets
  - description: Manage orders (sales orders and their line items) in a workspace
    name: Orders
  - description: Manage lead sources in a workspace
    name: Sources
  - description: Manage products in a workspace
    name: Products

paths:
  '/workspaces/{workspace_id}/{table_name}/records':
    get:
      description: |
        List records in a table. Only supports `lead`, `account`, `contact`.
      operationId: records
      parameters:
        - $ref: '#/parameters/WorkspaceId'
        - $ref: '#/parameters/TableName'
        - $ref: '#/parameters/RecordFilter'
        - $ref: '#/parameters/RecordViewId'
        - $ref: '#/parameters/Cursor'
      responses:
        '200':
          description: Record list returned
          schema:
            title: Records List
            type: object
            description: Records List
            properties:
              cursor:
                type: string
                description: Pagination cursor of the current page, used as a parameter to retrieve records from the next page
              # page_number:
              #   default: 1
              #   description: The page number of current results
              #   type: integer
              # page_size:
              #   default: 30
              #   description: The number of records returned within a single API call
              #   enum:
              #     - 30
              #     - 50
              #     - 100
              #   type: integer
              # total_entries:
              #   description: The number of all records available across pages
              #   type: integer
              # total_pages:
              #   description: The number of items returned on this page
              #   type: integer
              entries:
                description: List of record objects
                items:
                  $ref: '#/definitions/Record'
                type: array
      summary: List records
      tags:
        - Records
    post:
      description: |
        Insert or update a record in current table. Only supports `lead`, `account`, `contact`.
        <aside>Provide the record ID in the parameters to update an existing record. Otherwise, a new record will be created.</aside>
      operationId: recordCreate
      parameters:
        - $ref: '#/parameters/WorkspaceId'
        - $ref: '#/parameters/TableName'
        - description: Upsert record.
          in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/Record'
      responses:
        '200':
          description: Record upserted successfully
          schema:
            title: Upsert Response
            type: object
            description: Response object
            properties:
              success:
                description: Indicates whether the upsert operation was successful
                type: boolean
              data:
                description: The record object
                $ref: '#/definitions/Record'
        '403':
          description: "Forbidden, insufficient permissions"
          schema:
            title: Error Response
            type: object
            description: Error response object
            properties:
              success:
                description: Always false for error responses
                type: boolean
              message:
                type: object
        '422':
          description: "Customer information cannot be updated once it has been canceled, converted, or merged"
          schema:
            title: Response object
            type: object
            description: Response object
            properties:
              success:
                description: Always false for error responses
                type: boolean
              message:
                type: string
                enum:
                  - LEAD_CANNOT_UPDATE_FROM_CANCEL
        # '404':
        #   description: "Record doesn't exist"
      summary: Upsert record
      tags:
        - Records
    delete:
      summary: Delete records
      description: Remove multiple records from a table by record IDs. Only supports `lead`, `account`, `contact`.
      operationId: deleteRecords
      parameters:
        - $ref: '#/parameters/WorkspaceId'
        - $ref: '#/parameters/TableName'
        - $ref: '#/parameters/RecordIds'
      responses:
        '200':
          description: Records deleted successfully
          schema:
            type: object
            properties:
              success:
                type: boolean
                description: Indicates whether the delete operation was successful
              fallback:
                type: string
                example: 'success_only'
        # '404':
        #   description: Account not found
      tags:
        - Records
  '/workspaces/{workspace_id}/record/{record_id}':
    get:
      description: Retrieve a record by ID. Only supports `lead`, `account`, `contact`.
      operationId: record
      parameters:
        - $ref: '#/parameters/WorkspaceId'
        - $ref: '#/parameters/TableNameQuery'
        - $ref: '#/parameters/RecordId'
      responses:
        '200':
          description: Record returned
          schema:
            title: Record Response
            type: object
            description: Single record response
            properties:
              success:
                description: Indicates whether the request was successful
                type: boolean
              data:
                description: The record object
                $ref: '#/definitions/Record'
        # '404':
        #   description: User not found
      summary: Get record
      tags:
        - Records

  # '/workspaces/{workspace_id}/products':
  #   get:
