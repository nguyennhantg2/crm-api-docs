<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Pancake CRM API Docs</title>

  <script src="./assets/web-components.min.js"></script>
  <link rel="stylesheet" href="./assets/styles.min.css">
  <link rel="stylesheet" href="./assets/crm.min.css">
  <link rel="icon" type="image/png" href="./assets/images/logo.png">
</head>

<body>
  <nav class="doc-tabs">
    <a href="/developers" id="tab-api">API Reference</a>
    <a href="/developers?doc=webhook" id="tab-webhook">Webhooks</a>
  </nav>
  <div id="docs-root"></div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var doc = params.get('doc') === 'webhook' ? 'webhook' : 'api';
      var specUrl = doc === 'webhook' ? './openapi/webhook.yaml' : './openapi/openapi.yaml';
      document.title = doc === 'webhook' ? 'Pancake CRM Webhooks Docs' : 'Pancake CRM API Docs';
      document.getElementById('tab-' + (doc === 'webhook' ? 'webhook' : 'api')).classList.add('active');
      var el = document.createElement('elements-api');
      el.setAttribute('apiDescriptionUrl', specUrl);
      el.setAttribute('layout', 'sidebar');
      el.setAttribute('router', 'hash');
      document.getElementById('docs-root').appendChild(el);
    })();
  </script>
</body>

</html>
